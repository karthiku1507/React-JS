        <title>JS Button</title>

    <body>

         function createOL(){

         li1.innerText = "abj kalam";

         ol.append(li1);
         ol.append(li2);
         ol.append(li3);

          
         document.querySelector("body").appendChild(ol);
         }
         document.querySelector("body").appendChild(btn);
         createOL();
         createOL();
         createOL();

        </script>
